<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>People Analytics | Dark Executive Suite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-main: #0F172A;
            --bg-card: #1E293B;
            --bg-secondary: #334155;
            --text-main: #E5E7EB;
            --text-muted: #94A3B8;
            --accent-blue: #3B82F6;
        }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-main); color: var(--text-main); }
        .card { background-color: var(--bg-card); border: 1px solid var(--bg-secondary); border-radius: 12px; }
        .filter-select { background-color: var(--bg-secondary); border: 1px solid #475569; color: white; border-radius: 8px; padding: 6px 12px; }
        .kpi-value { font-size: 1.875rem; font-weight: 800; }
        .kpi-label { font-size: 0.75rem; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; }
    </style>
</head>
<body class="p-4 lg:p-8">

    <header class="max-w-[1600px] mx-auto flex flex-col xl:flex-row justify-between items-start xl:items-center mb-8 gap-6">
        <div>
            <div class="flex items-center gap-3 mb-1">
                <div class="w-2 h-8 bg-blue-500 rounded-full shadow-[0_0_15px_rgba(59,130,246,0.5)]"></div>
                <h1 class="text-2xl font-bold tracking-tight">People Analytics <span class="text-blue-500">Executive</span></h1>
            </div>
            <p class="text-slate-400 text-sm">Monitoramento Estratégico de Capital Humano</p>
        </div>

        <div class="flex flex-wrap gap-4 items-center bg-[#1E293B]/50 p-3 rounded-xl border border-slate-700">
            <select id="deptFilter" class="filter-select text-xs w-40" onchange="updateDashboard()">
                <option value="all">Empresa Inteira</option>
                <option value="tech">Tecnologia</option>
                <option value="sales">Vendas & Marketing</option>
            </select>
            <button onclick="updateDashboard()" class="bg-blue-600 hover:bg-blue-500 text-white px-6 py-2 rounded-lg text-xs font-bold transition-all">
                Atualizar Dados
            </button>
        </div>
    </header>

    <main class="max-w-[1600px] mx-auto">
        <section class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-5 gap-4 mb-8">
            <div class="card p-5 border-l-4 border-blue-500">
                <p class="kpi-label">Colaboradores</p>
                <h2 id="kpiHeadcount" class="kpi-value">-</h2>
            </div>
            <div class="card p-5 border-l-4 border-amber-500">
                <p class="kpi-label">Taxa Turnover</p>
                <h2 id="kpiTurnover" class="kpi-value text-amber-500">-</h2>
            </div>
            <div class="card p-5 border-l-4 border-emerald-500">
                <p class="kpi-label">Retenção</p>
                <h2 id="kpiRetention" class="kpi-value">-</h2>
            </div>
            <div class="card p-5 border-l-4 border-rose-500">
                <p class="kpi-label">Absenteísmo</p>
                <h2 id="kpiAbsent" class="kpi-value">-</h2>
            </div>
            <div class="card p-5 border-l-4 border-purple-500">
                <p class="kpi-label">eNPS Score</p>
                <h2 id="kpiEnps" class="kpi-value text-purple-400">-</h2>
            </div>
        </section>

        <section class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-8">
            <div class="card p-6 lg:col-span-2">
                <h3 class="text-sm font-bold text-slate-300 mb-6 italic">Evolução Mensal</h3>
                <div class="h-[300px] relative">
                    <canvas id="evolutionChart"></canvas>
                </div>
            </div>
            <div class="card p-6">
                <h3 class="text-sm font-bold text-slate-300 mb-6">Headcount por Depto</h3>
                <div class="h-[300px] relative">
                    <canvas id="deptHeadcountChart"></canvas>
                </div>
            </div>
        </section>

        <section class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="card p-6">
                <h3 class="text-sm font-bold text-slate-300 mb-6">Gênero</h3>
                <div class="h-[250px] relative">
                    <canvas id="diversityChart"></canvas>
                </div>
            </div>
            <div class="card p-6 lg:col-span-2 bg-gradient-to-br from-[#1E293B] to-[#0F172A]">
                <h3 class="text-xs font-black text-blue-400 uppercase tracking-widest mb-4">Insights Estratégicos (IA)</h3>
                <ul id="insightsList" class="space-y-4">
                    </ul>
            </div>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <script>
        // Dados fictícios
        const db = {
            all: {
                headcount: "1.248", turnover: "3.8%", retention: "96.2%", absent: "1.4%", enps: "72",
                evolution: [2.5, 2.8, 3.1, 3.8, 3.4, 3.9],
                deptHeadcount: [450, 320, 380, 98],
                gender: [48, 52],
                insights: ["Turnover saudável, abaixo da meta de 5%.", "eNPS de 72 pontos indica zona de excelência."]
            },
            tech: {
                headcount: "450", turnover: "2.1%", retention: "97.9%", absent: "0.8%", enps: "84",
                evolution: [1.5, 1.8, 2.0, 2.1, 1.9, 2.1],
                deptHeadcount: [200, 150, 60, 40],
                gender: [22, 78],
                insights: ["Retenção em tecnologia é a maior da empresa.", "Gap de gênero em engenharia precisa de atenção."]
            }
        };

        let myCharts = {};

        function initCharts() {
            // Verificação se o Chart.js carregou
            if (typeof Chart === 'undefined') {
                alert("Erro: Não foi possível carregar a biblioteca de gráficos. Verifique sua internet.");
                return;
            }

            Chart.defaults.color = '#94A3B8';
            
            // Gráfico 1: Linha
            myCharts.evo = new Chart(document.getElementById('evolutionChart'), {
                type: 'line',
                data: {
                    labels: ['Jan', 'Fev', 'Mar', 'Abr', 'Mai', 'Jun'],
                    datasets: [{ label: 'Turnover %', data: db.all.evolution, borderColor: '#3B82F6', tension: 0.4 }]
                },
                options: { responsive: true, maintainAspectRatio: false }
            });

            // Gráfico 2: Barra
            myCharts.bar = new Chart(document.getElementById('deptHeadcountChart'), {
                type: 'bar',
                data: {
                    labels: ['Tech', 'Vendas', 'Ops', 'RH'],
                    datasets: [{ data: db.all.deptHeadcount, backgroundColor: '#8B5CF6' }]
                },
                options: { responsive: true, maintainAspectRatio: false }
            });

            // Gráfico 3: Pizza
            myCharts.pie = new Chart(document.getElementById('diversityChart'), {
                type: 'doughnut',
                data: {
                    labels: ['Mulheres', 'Homens'],
                    datasets: [{ data: db.all.gender, backgroundColor: ['#3B82F6', '#8B5CF6'] }]
                },
                options: { responsive: true, maintainAspectRatio: false, cutout: '80%' }
            });

            updateDashboard(); // Preenche os dados após criar os gráficos
        }

        function updateDashboard() {
            const dept = document.getElementById('deptFilter').value;
            const data = db[dept] || db.all;

            // KPIs
            document.getElementById('kpiHeadcount').innerText = data.headcount;
            document.getElementById('kpiTurnover').innerText = data.turnover;
            document.getElementById('kpiRetention').innerText = data.retention;
            document.getElementById('kpiAbsent').innerText = data.absent;
            document.getElementById('kpiEnps').innerText = data.enps;

            // Gráficos
            if(myCharts.evo) {
                myCharts.evo.data.datasets[0].data = data.evolution;
                myCharts.evo.update();
                
                myCharts.bar.data.datasets[0].data = data.deptHeadcount;
                myCharts.bar.update();

                myCharts.pie.data.datasets[0].data = data.gender;
                myCharts.pie.update();
            }

            // Insights
            const list = document.getElementById('insightsList');
            list.innerHTML = data.insights.map(i => `<li class="text-sm border-l-2 border-slate-700 pl-4 py-1">${i}</li>`).join('');
        }

        // Garante que o script rode apenas após tudo carregar
        window.addEventListener('load', initCharts);
    </script>
</body>
</html>
